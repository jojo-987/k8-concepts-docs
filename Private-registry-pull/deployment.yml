apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - image: krishp234/basic-vite
          name: frontend-image
          ports:
            - containerPort: 5173
      imagePullSecrets:
      - name: regcred
